<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>카페인 섭취 분석 & 음료 추천</title>
  <style>
    body {
      font-family: Arial;
      background: #f2f4f8;
      text-align: center;
      padding: 30px;
    }

    .box {
      background: white;
      padding: 25px;
      max-width: 600px;
      margin: auto;
      border-radius: 15px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input, select {
      width: 80%;
      padding: 10px;
      margin: 8px;
    }

    button {
      padding: 10px 20px;
      background: #4a90e2;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }

    .drink {
      text-align: left;
      background: #eef5ff;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
    }

    .warn {
      color: red;
      font-size: 13px;
      margin-top: 15px;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>☕ 카페인 섭취 분석 & 음료 추천</h2>

  <input type="number" id="weight" placeholder="몸무게 (kg)">

  <select id="age">
    <option value="teen">청소년 (13~18)</option>
    <option value="adult">성인 (19+)</option>
  </select>

  <select id="gender">
    <option value="male">남성</option>
    <option value="female">여성</option>
  </select>

  <button onclick="calc()">계산하기</button>

  <div id="result"></div>
</div>

<script>
function calc() {
  const w = Number(document.getElementById("weight").value);
  const age = document.getElementById("age").value;
  const gender = document.getElementById("gender").value;

  const result = document.getElementById("result");

  if (!w || w <= 0) {
    result.innerHTML = "올바른 몸무게 입력";
    return;
  }

  // 기본 기준
  let limitByWeight = w * 2.5;

  // 연령 기준 추가
  let finalLimit;

  if (age === "adult") {
    finalLimit = Math.min(limitByWeight, 400);
  } else {
    // 청소년은 더 보수적으로 제한
    finalLimit = Math.min(limitByWeight, 100);
  }

  // 성별은 계산에 영향 X (과학적으로 큰 차이 없음)
  let drinks = [
    { name: "스타벅스 아메리카노 (Tall)", caf: 150, price: 4500 },
    { name: "스타벅스 콜드브루", caf: 155, price: 5000 },
    { name: "레드불 (250ml)", caf: 80, price: 2500 },
    { name: "몬스터 에너지 (355ml)", caf: 120, price: 3000 },
    { name: "핫식스 (250ml)", caf: 70, price: 2000 },
    { name: "이디야 아메리카노", caf: 140, price: 3500 },
    { name: "녹차 (페트병 기준)", caf: 30, price: 1800 },
    { name: "디카페인 커피", caf: 10, price: 4500 }
  ];

  let list = "";

  drinks.forEach(d => {
    if (d.caf <= finalLimit) {
      list += `
        <div class="drink">
          <b>${d.name}</b><br>
          카페인: ${d.caf}mg<br>
          가격: 약 ${d.price}원
        </div>
      `;
    }
  });

  result.innerHTML = `
    <h3>결과</h3>
    <p>
      체중 ${w}kg / ${age === "adult" ? "성인" : "청소년"} 기준<br>
      권장 최대 카페인: <b>${Math.round(finalLimit)}mg</b>
    </p>

    <h4>섭취 가능 음료</h4>
    ${list}

    <p class="warn">
      ※ 성별에 따른 카페인 권장량 차이는 과학적으로 유의미하지 않으며, 연령·체중이 주요 기준입니다.
    </p>
  `;
}
</script>

</body>
</html>
