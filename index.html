<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>카페인 분석기</title>
  <style>
    body {
      font-family: Arial;
      background: #f2f4f8;
      text-align: center;
      padding: 30px;
    }

    .box {
      background: white;
      padding: 25px;
      max-width: 600px;
      margin: auto;
      border-radius: 15px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input, select {
      width: 80%;
      padding: 10px;
      margin: 8px;
    }

    button {
      padding: 10px 20px;
      background: #4a90e2;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }

    .drink {
      text-align: left;
      background: #eef5ff;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
    }

    .warn {
      color: red;
      font-size: 13px;
      margin-top: 15px;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>☕ 카페인 섭취 분석 & 추천</h2>

  <input type="number" id="weight" placeholder="몸무게 (kg)">

  <select id="age">
    <option value="teen">청소년 (13~18)</option>
    <option value="adult">성인 (19+)</option>
  </select>

  <button onclick="calc()">계산하기</button>

  <div id="result"></div>
</div>

<script>
function calc() {
  const w = Number(document.getElementById("weight").value);
  const age = document.getElementById("age").value;
  const result = document.getElementById("result");

  if (!w || w <= 0) {
    result.innerHTML = "몸무게를 올바르게 입력하세요.";
    return;
  }

  // 1. 체중 기준
  let weightLimit = w * 4;

  // 2. 연령 기준
  let ageLimit;
  let ageText;

  if (age === "adult") {
    ageLimit = 400;
    ageText = "성인 기준 (400mg)";
  } else {
    ageLimit = w * 3;
    ageText = "청소년 기준 (100mg)";
  }

  // 3. 최종 제한
  let finalLimit = Math.min(weightLimit, ageLimit);

  let drinks = [
    { name: "스타벅스 아메리카노", caf: 150, price: 4500 },
    { name: "스타벅스 콜드브루", caf: 155, price: 5000 },
    { name: "몬스터 에너지", caf: 120, price: 3000 },
    { name: "레드불", caf: 80, price: 2500 },
    { name: "핫식스", caf: 70, price: 2000 },
    { name: "이디야 아메리카노", caf: 140, price: 3500 },
    { name: "녹차", caf: 30, price: 1800 },
    { name: "디카페인 커피", caf: 10, price: 4500 }
  ];

  let list = "";

  drinks.forEach(d => {
    if (d.caf <= finalLimit) {
      list += `
        <div class="drink">
          <b>${d.name}</b><br>
          카페인: ${d.caf}mg / 가격: ${d.price}원
        </div>
      `;
    }
  });

  result.innerHTML = `
    <h3>결과</h3>

    <p>
      체중 기준: ${Math.round(weightLimit)}mg<br>
      ${ageText}<br><br>

      👉 최종 권장 섭취량: <b>${Math.round(finalLimit)}mg</b>
    </p>

    <h4>섭취 가능 음료</h4>
    ${list}

    <p class="warn">
      ※ 실제 권장 기준은 개인 건강 상태에 따라 달라질 수 있습니다.
    </p>
  `;
}
</script>

</body>
</html>
